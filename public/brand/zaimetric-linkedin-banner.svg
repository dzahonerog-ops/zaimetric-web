  <rect x="120" y="210" width="24" height="42" rx="4" fill="url(#b1g)"/>
  <rect x="152" y="178" width="24" height="74" rx="4" fill="url(#b2g)"/>
  <rect x="184" y="146" width="24" height="106" rx="4" fill="url(#b3g)"/>
